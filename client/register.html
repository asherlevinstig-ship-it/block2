<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blockcraft - Register</title>
<style>
  :root{color-scheme:dark;--bg:#081018;--panel:#111a24;--line:#2b8eb8;--text:#edf7ff;--muted:#9fb6c6;--good:#9bd86b;--bad:#ff8b8b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#172637 0,#081018 52%,#05090d 100%);font-family:Georgia,"Times New Roman",serif;color:var(--text)}
  main{width:min(92vw,520px);border:2px solid rgba(79,216,255,.65);background:rgba(9,17,26,.94);box-shadow:0 28px 80px rgba(0,0,0,.55);padding:34px}
  h1{margin:0 0 8px;text-align:center;letter-spacing:8px;color:#9bd86b;text-shadow:0 3px #31551d;font-size:34px}
  p{margin:0 0 24px;text-align:center;color:var(--muted);letter-spacing:1px;line-height:1.45}
  label{display:block;margin:14px 0 6px;color:#cfe9f8;font-size:13px;letter-spacing:2px;text-transform:uppercase}
  input,select{width:100%;height:46px;border:1px solid var(--line);background:#07111b;color:var(--text);padding:0 14px;font:16px Georgia,"Times New Roman",serif;outline:none}
  input:focus,select:focus{border-color:#88e8ff;box-shadow:0 0 0 3px rgba(79,216,255,.18)}
  button{width:100%;height:54px;margin-top:22px;border:0;background:#5f963d;color:#fff;font:700 16px Georgia,"Times New Roman",serif;letter-spacing:3px;cursor:pointer}
  button:disabled{opacity:.55;cursor:wait}
  .links{display:flex;justify-content:space-between;gap:14px;margin-top:18px;font-size:14px}
  a{color:#8bdfff;text-decoration:none}
  #status{min-height:22px;margin-top:16px;text-align:center;color:var(--muted)}
  #status.good{color:var(--good)}#status.bad{color:var(--bad)}
</style>
</head>
<body>
<main>
  <h1>BLOCKCRAFT</h1>
  <p>Create your school login. We will find your school from your email address.</p>
  <form id="registerForm">
    <label for="email">School email</label>
    <input id="email" name="email" type="email" autocomplete="email" required>
    <label for="yearGroup">Year group</label>
    <select id="yearGroup" name="yearGroup" required>
      <option value="">Select year group</option>
      <option>Year 3</option><option>Year 4</option><option>Year 5</option><option>Year 6</option>
      <option>Year 7</option><option>Year 8</option><option>Year 9</option><option>Year 10</option>
      <option>Year 11</option><option>Year 12</option><option>Year 13</option>
    </select>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" minlength="10" maxlength="128" autocomplete="new-password" required>
    <button id="submitBtn" type="submit">CREATE ACCOUNT</button>
  </form>
  <div id="status" role="status" aria-live="polite"></div>
  <div class="links"><a href="/">Back to game</a><a href="/?login=1">I already have an account</a></div>
</main>
<script type="module" src="./register.js"></script>
</body>
</html>
