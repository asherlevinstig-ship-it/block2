name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Unit tests (server authority + anti-cheat)
        run: npm test
      - name: Integration test (live two-client room)
        run: npm run test:integration
      - name: Install browser test runtime
        run: npx playwright install --with-deps chromium
      - name: Browser end-to-end tests
        run: npm run test:e2e
